<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonogaPhotoBooth</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Poppins', sans-serif;
/* Gradasi Coklat ke Krem untuk background luar */
background: linear-gradient(135deg, #8B5E34 0%, #E6D5B8 100%);
min-height: 100vh;
padding: 20px;
}
.container {
max-width: 480px;
margin: 0 auto;
background: #f8f9fa;
border-radius: 20px;
overflow: hidden;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.header {
/* Gradasi Coklat ke Krem untuk Header */
background: linear-gradient(135deg, #8B5E34 0%, #E6D5B8 100%);
padding: 40px 20px 30px;
text-align: center;
color: white;
}
.profile-logo {
width: 120px;
height: 120px;
border-radius: 50%;
object-fit: cover;
object-position: center;
background: white;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
margin-bottom: 20px;
display: block;
margin-left: auto;
margin-right: auto;
}
.username {
font-size: 22px;
font-weight: 700;
margin-bottom: 15px;
}
.description {
font-size: 14px;
line-height: 1.8;
opacity: 0.95;
}
.links-section {
padding: 20px;
}
.link-button {
display: block;
width: 100%;
padding: 18px 20px;
margin-bottom: 12px;
background: white;
border: 2px solid #e9ecef;
border-radius: 12px;
text-decoration: none;
color: #333;
font-weight: 600;
font-size: 15px;
text-align: center;
transition: all 0.3s ease;
cursor: pointer;
}
.link-button:hover {
/* Efek hover tombol Coklat */
background: #8B5E34;
color: white;
border-color: #8B5E34;
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(139, 94, 52, 0.4);
}
.link-button i {
margin-right: 8px;
}
.albums-section {
padding: 20px;
}
.section-title {
text-align: center;
font-size: 18px;
font-weight: 700;
color: #333;
margin-bottom: 20px;
}
.section-title i {
color: #8B5E34;
margin-right: 8px;
}
.album-button {
display: flex;
align-items: center;
background: white;
border-radius: 12px;
padding: 18px 20px;
margin-bottom: 12px;
text-decoration: none;
color: #333;
transition: all 0.3s ease;
border: 2px solid #e9ecef;
}
.album-button:hover {
border-color: #8B5E34;
background: #8B5E34;
color: white;
transform: translateX(5px);
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.album-icon {
/* Gradasi Coklat ke Krem untuk Ikon Folder */
background: linear-gradient(135deg, #8B5E34 0%, #E6D5B8 100%);
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
margin-right: 15px;
color: white;
font-size: 20px;
flex-shrink: 0;
}
.album-button:hover .album-icon {
background: white;
color: #8B5E34;
}
.album-name {
flex: 1;
font-weight: 600;
font-size: 14px;
}
.album-arrow {
color: #999;
font-size: 16px;
}
.album-button:hover .album-arrow {
color: white;
}
.footer {
background: #f8f9fa;
padding: 20px;
text-align: center;
border-top: 1px solid #e9ecef;
}
.footer-text {
font-size: 13px;
color: #666;
margin-bottom: 10px;
}
.footer-links {
display: flex;
justify-content: center;
gap: 15px;
font-size: 12px;
}
.footer-links a {
color: #8B5E34;
text-decoration: none;
}
.footer-links a:hover {
text-decoration: underline;
}
@media (max-width: 480px) {
body {
padding: 0;
}
.container {
border-radius: 0;
min-height: 100vh;
}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<img class="profile-logo" src="LINK_LOGO_ATAU_BASE64_DISINI" alt="Logo MonogaPhotoBooth">
<h1 class="username">@MonogaPhotoBooth</h1>
<p class="description">
Aman & Terpercaya | Murah & Berkualitas<br>
Wedding, Event & more | Harga mulai 1 jutaan<br>
</p>
</div>
<div class="links-section">
<a href="#" class="link-button" id="whatsappBtn">
<i class="fab fa-whatsapp"></i> WHATSAPP (Pricelist & Booking)
</a>
<a href="#" class="link-button" id="instagramBtn">
<i class="fab fa-instagram"></i> INSTAGRAM
</a>
</div>
<div class="albums-section">
<h2 class="section-title">
<i class="fas fa-download"></i> Download Album Foto
</h2>
<div id="albumsContainer"></div>
</div>
<div class="footer">
<p class="footer-text">Bergabung dengan MonogaPhotoBooth</p>
<div class="footer-links">
<a href="#">Cookie Preferences</a>
<a href="#">Report</a>
<a href="#">Privacy</a>
</div>
</div>
</div>
<script>
// ==========================================
// KONFIGURASI KONTAK
// ==========================================
const contactInfo = {
whatsappNumber: '6281927310298',
whatsappMessage: 'Halo MonogaPhotoBooth.',
instagramUrl: 'https://www.instagram.com/monoga.photobooth?igsh=ZXg0MTkzMnRrNjI2'
};

// ==========================================
// DAFTAR ALBUM FOTO
// ==========================================
const albums = [
{
name: "ALIN & ANDO",
// MASUKKAN LINK GOOGLE PHOTOS DI BAWAH INI
albumLink: "https://photos.app.goo.gl/LINK_FOTO_ALIN_ANDO" 
},
{
name: "SOON",
// MASUKKAN LINK GOOGLE PHOTOS DI BAWAH INI
albumLink: "#" 
},
];

// ==========================================
// FUNGSI UNTUK MENAMPILKAN ALBUM
// ==========================================
function tampilkanAlbum() {
const container = document.getElementById('albumsContainer');

albums.forEach(function(album) {
const tombol = document.createElement('a');
tombol.className = 'album-button';
tombol.href = album.albumLink;
tombol.target = '_blank';

tombol.innerHTML = `
<div class="album-icon">
<i class="fas fa-folder-open"></i>
</div>
<div class="album-name">${album.name}</div>
<div class="album-arrow">
<i class="fas fa-chevron-right"></i>
</div>
`;

container.appendChild(tombol);
});
}

// ==========================================
// EVENT LISTENER - SAAT HALAMAN DIMUAT
// ==========================================
document.addEventListener('DOMContentLoaded', function() {
// Tampilkan semua album
tampilkanAlbum();

// Tombol WhatsApp diklik
document.getElementById('whatsappBtn').addEventListener('click', function(e) {
e.preventDefault();
const pesan = encodeURIComponent(contactInfo.whatsappMessage);
const url = `https://wa.me/${contactInfo.whatsappNumber}?text=${pesan}`;
window.open(url, '_blank');
});

// Tombol Instagram diklik
document.getElementById('instagramBtn').addEventListener('click', function(e) {
e.preventDefault();
window.open(contactInfo.instagramUrl, '_blank');
});
});
</script>
</body>
</html>
